name: Build Android ARM64 Native Hook

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Dùng NDK có sẵn trong máy ảo Ubuntu của GitHub
    - name: Locate and Export Android NDK
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk-bundle" >> $GITHUB_ENV
        if [ -d "$ANDROID_HOME/ndk" ]; then
          LATEST_NDK=$(ls -r $ANDROID_HOME/ndk | head -n 1)
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$LATEST_NDK" >> $GITHUB_ENV
        fi

    # Tải các thư viện phụ thuộc
    - name: Download Dependencies (Dobby & XDL)
      run: |
        echo "[*] Cleaning old directories if any..."
        rm -rf dobby xdl
        
        echo "[*] Downloading Dobby Hook Framework..."
        git clone --depth=1 https://github.com/jmpews/Dobby.git dobby
        
        echo "[*] Downloading xdl (Linker Extension)..."
        git clone --depth=1 https://github.com/hexhacking/xdl.git xdl

    # Tự động build Dobby trước (Đã thêm cờ cấu hình chuẩn cho Android ARM64)
    - name: Pre-build Dobby
      run: |
        mkdir -p dobby/build && cd dobby/build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DBUILD_SHARED_LIBS=OFF \
          -DDOBBY_GENERATE_SHARED=OFF \
          -DDOBBY_BUILD_TESTING=OFF \
          -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc) dobby

    - name: Build Main Hook Library
      run: |
        mkdir -p build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Upload Output Library (.so)
      uses: actions/upload-artifact@v4
      with:
        name: libebpf_helper-arm64
        path: build/libebpf_helper.so
