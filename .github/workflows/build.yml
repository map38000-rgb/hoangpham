name: Compile eBPF for Android ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-ebpf:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt Clang Host và các công cụ BPF
      run: |
        sudo apt-get update -y
        sudo apt-get install -y -f \
          clang \
          llvm \
          libbpf-dev \
          libelf-dev \
          zlib1g-dev

    - name: Cài đặt Android NDK (r26b)
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
        unzip -q android-ndk-r26b-linux.zip
        echo "NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r26b" >> $GITHUB_ENV

    - name: Cài đặt bpftool (Standalone Binary)
      run: |
        curl -sLO https://github.com/libbpf/bpftool/releases/download/v7.4.0/bpftool-v7.4.0-amd64.tar.gz
        tar -xzf bpftool-v7.4.0-amd64.tar.gz
        chmod +x bpftool
        sudo mv bpftool /usr/local/bin/
        /usr/local/bin/bpftool --version

    - name: Tạo thư mục build
      run: mkdir -p build

    - name: Biên dịch eBPF Program (netlog.bpf.c)
      run: |
        clang -g -O2 \
          -target bpf \
          -D__TARGET_ARCH_arm64 \
          -I . \
          -c netlog.bpf.c \
          -o build/netlog.bpf.o

    - name: Tạo BPF Skeleton (netlog.skel.h)
      run: |
        /usr/local/bin/bpftool gen skeleton build/netlog.bpf.o > netlog.skel.h

    - name: Sửa warning Redefined trong netlog.c
      run: |
        sed -i '/#define AF_INET/d' netlog.c

    - name: Biên dịch User-space Binary bằng Android NDK (ARM64 API 30)
      run: |
        # Đường dẫn tới Clang trong NDK
        CC=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang

        # Dùng libbpf source/headers để build native với Bionic
        $CC -g -O2 \
          -I . \
          netlog.c \
          -lelf -lz \
          -o build/netlog

    - name: Lưu trữ sản phẩm biên dịch
      uses: actions/upload-artifact@v4
      with:
        name: ebpf-android
        path: build/
