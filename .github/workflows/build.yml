name: Compile eBPF for Android ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-ebpf:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt Clang và thư viện
      run: |
        sudo apt-get update -y
        sudo apt-get install -y -f \
          clang \
          llvm \
          libbpf-dev

    - name: Tạo thư mục build
      run: mkdir -p build

    - name: Biên dịch eBPF cho Android (ARM64)
      run: |
        clang -g -O2 \
          -target bpf \
          -D__TARGET_ARCH_arm64 \
          -I . \
          -c netlog.bpf.c \
          -o build/netlog.bpf.arm64.o

    - name: Lưu trữ sản phẩm biên dịch
      uses: actions/upload-artifact@v4
      with:
        name: ebpf-android
        path: build/
