name: Compile eBPF for Android ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-ebpf:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cấu hình APT Repositories cho ARM64 & Cài đặt Thư viện
      run: |
        sudo dpkg --add-architecture arm64
        
        # Chỉ định repository mặc định chỉ dùng cho amd64
        sudo sed -i 's/Types: deb/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources

        # Thêm source ports.ubuntu.com dành riêng cho arm64
        sudo tee /etc/apt/sources.list.d/arm64.sources << 'EOF'
        Types: deb
        URIs: http://ports.ubuntu.com/ubuntu-ports
        Suites: noble noble-updates noble-backports noble-security
        Components: main restricted universe multiverse
        Architectures: arm64
        Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
        EOF

        sudo apt-get update -y
        sudo apt-get install -y -f \
          clang \
          llvm \
          gcc-aarch64-linux-gnu \
          libbpf-dev:arm64 \
          libelf-dev:arm64 \
          zlib1g-dev:arm64 \
          libzstd-dev:arm64

    - name: Cài đặt bpftool (Standalone Binary)
      run: |
        curl -sLO https://github.com/libbpf/bpftool/releases/download/v7.4.0/bpftool-v7.4.0-amd64.tar.gz
        tar -xzf bpftool-v7.4.0-amd64.tar.gz
        chmod +x bpftool
        sudo mv bpftool /usr/local/bin/
        /usr/local/bin/bpftool --version

    - name: Tạo thư mục build
      run: mkdir -p build

    - name: Biên dịch eBPF (netlog.bpf.c)
      run: |
        clang -g -O2 \
          -target bpf \
          -D__TARGET_ARCH_arm64 \
          -I . \
          -c netlog.bpf.c \
          -o build/netlog.bpf.o

    - name: Tạo BPF Skeleton (netlog.skel.h)
      run: |
        /usr/local/bin/bpftool gen skeleton build/netlog.bpf.o > netlog.skel.h

    - name: Sửa warning Redefined trong netlog.c
      run: |
        sed -i '/#define AF_INET/d' netlog.c

    - name: Biên dịch User-space Binary (Static Build cho Android ARM64)
      run: |
        aarch64-linux-gnu-gcc -g -O2 \
          -static \
          -I . \
          netlog.c \
          -lbpf -lelf -lz -lzstd \
          -o build/netlog

    - name: Lưu trữ sản phẩm biên dịch
      uses: actions/upload-artifact@v4
      with:
        name: ebpf-android
        path: build/
