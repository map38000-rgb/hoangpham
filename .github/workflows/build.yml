name: Compile eBPF for x86_64 and arm64

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Cho phép bấm chạy thủ công trên giao diện GitHub

jobs:
  build-ebpf:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt Clang, LLVM và các công cụ biên dịch chéo
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          llvm \
          libbpf-dev \
          gcc-multilib \
          gcc-aarch64-linux-gnu \
          libc6-dev-arm64-cross

    - name: Tạo thư mục chứa sản phẩm đầu ra (Artifacts)
      run: mkdir -p build

    # Biên dịch cho x86_64
    - name: Biên dịch eBPF cho x86_64
      run: |
        clang -g -O2 \
          -target bpf \
          -D__TARGET_ARCH_x86 \
          -I . \
          -c netlog.bpf.c \
          -o build/netlog.bpf.x86_64.o

    # Biên dịch cho arm64 (Sử dụng thêm các đường dẫn header của kiến trúc ARM64 cross-compile)
    - name: Biên dịch eBPF cho arm64
      run: |
        clang -g -O2 \
          -target bpf \
          -D__TARGET_ARCH_arm64 \
          -I . \
          -I /usr/aarch64-linux-gnu/include \
          -c netlog.bpf.c \
          -o build/netlog.bpf.arm64.o

    # Upload file .o đã biên dịch lên GitHub Artifacts để bạn tải về
    - name: Lưu trữ sản phẩm biên dịch
      uses: actions/upload-artifact@v4
      with:
        name: ebpf-objects
        path: build/
